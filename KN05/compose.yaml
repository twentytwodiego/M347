services:
  nginx1:
    image: nginx:latest
    container_name: nginx1
    ports:
      - "8081:80"
    volumes:
      - type: volume
        source: mein_named_volume
        target: /usr/share/nginx/html
      - type: bind
        source: C:\KN05-compose\binddata
        target: /binddata
    tmpfs:
      - /tmpfsdata

  nginx2:
    image: nginx:latest
    container_name: nginx2
    ports:
      - "8082:80"
    volumes:
      - mein_named_volume:/usr/share/nginx/html

volumes:
  mein_named_volume: